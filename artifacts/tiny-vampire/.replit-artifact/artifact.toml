kind = "web"
previewPath = "/"
title = "Long Day, Tiny Vampire"
version = "1.0.0"
id = "artifacts/tiny-vampire"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25718

[services.development]
run = "pnpm --filter @workspace/tiny-vampire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tiny-vampire", "run", "build" ]
publicDir = "artifacts/tiny-vampire/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25718"
BASE_PATH = "/"
